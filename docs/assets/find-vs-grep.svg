<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 410" role="img" aria-label="Terminal demo: grep scoped to Domain/ finds only the Order definition (2 matches); FsLangMCP find resolves 17 cross-project sites across 2 projects, including 9 in App/Program.fs that grep missed.">
<rect width="880" height="410" rx="10" fill="#0d1117"/>
<rect width="880" height="34" rx="10" fill="#161b22"/><rect y="18" width="880" height="16" fill="#161b22"/>
<circle cx="20" cy="17" r="6" fill="#ff5f56"/><circle cx="40" cy="17" r="6" fill="#ffbd2e"/><circle cx="60" cy="17" r="6" fill="#27c93f"/>
<text x="440" y="22" text-anchor="middle" fill="#6e7681" font-size="12" font-family="monospace">fslangmcp — find vs grep on a 2-project F# solution</text>
<g font-family="ui-monospace,'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13.5">
<text x="26" y="58" xml:space="preserve"><tspan fill="#3fb950" font-weight="700">$ </tspan><tspan fill="#c9d1d9">rg "Order" examples/quickstart/Domain/</tspan></text>
<text x="26" y="79" xml:space="preserve"><tspan fill="#6e7681">Domain/Order.fs:4:   </tspan><tspan fill="#c9d1d9">type Order = {</tspan></text>
<text x="26" y="100" xml:space="preserve"><tspan fill="#6e7681">Domain/Order.fs:10:  </tspan><tspan fill="#c9d1d9">module Order =</tspan></text>
<text x="26" y="121" xml:space="preserve"><tspan fill="#d29922">2 matches — Domain only. The App call-sites are invisible to grep.</tspan></text>
<text x="26" y="163" xml:space="preserve"><tspan fill="#58a6ff" font-weight="700">▸ </tspan><tspan fill="#c9d1d9">find { "query": "Order" }</tspan></text>
<text x="26" y="184" xml:space="preserve"><tspan fill="#3fb950" font-weight="700">matched </tspan><tspan fill="#56d364" font-weight="700">✓</tspan><tspan fill="#3fb950">  via fcs-multiproject-sweep · projectsSwept 2 · totalSites 17</tspan></text>
<text x="26" y="205" xml:space="preserve"><tspan fill="#c9d1d9">  App/Program.fs:3    </tspan><tspan fill="#58a6ff">reference          </tspan><tspan fill="#c9d1d9">Domain.Order      </tspan><tspan fill="#d29922">← grep missed</tspan></text>
<text x="26" y="226" xml:space="preserve"><tspan fill="#c9d1d9">  App/Program.fs:4    </tspan><tspan fill="#58a6ff">field-set-literal  </tspan><tspan fill="#c9d1d9">Domain.Order.Id   </tspan><tspan fill="#d29922">← grep missed</tspan></text>
<text x="26" y="247" xml:space="preserve"><tspan fill="#c9d1d9">  App/Program.fs:10   </tspan><tspan fill="#58a6ff">reference          </tspan><tspan fill="#c9d1d9">Order             </tspan><tspan fill="#d29922">← grep missed</tspan></text>
<text x="26" y="268" xml:space="preserve"><tspan fill="#c9d1d9">  Domain/Order.fs:4   </tspan><tspan fill="#58a6ff">definition         </tspan><tspan fill="#c9d1d9">Domain.Order</tspan></text>
<text x="26" y="289" xml:space="preserve"><tspan fill="#c9d1d9">  Domain/Order.fs:14  </tspan><tspan fill="#58a6ff">field-read         </tspan><tspan fill="#c9d1d9">Domain.Order.Amount</tspan></text>
<text x="26" y="310" xml:space="preserve"><tspan fill="#6e7681">  … 12 more sites across both projects</tspan></text>
<text x="26" y="331" xml:space="preserve"><tspan fill="#58a6ff">breakdown: 2 def · 5 ref · 6 field-set · 4 field-read</tspan></text>
<text x="26" y="352" xml:space="preserve"><tspan fill="#56d364" font-weight="700">✓ 9 cross-project sites in App that grep-on-Domain never saw.</tspan></text>
<rect x="26" y="361" width="9" height="15" fill="#3fb950"><animate attributeName="opacity" dur="1.1s" repeatCount="indefinite" keyTimes="0;0.5;0.5;1" values="1;1;0;0"/></rect>
</g>
</svg>