<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 410" font-size="13.5" role="img" aria-label="Terminal demo: grep on Domain/ finds only the Order definition; FsLangMCP find resolves 17 cross-project sites including 9 in App that grep missed.">
<rect width="880" height="410" rx="10" fill="#0d1117"/>
<rect width="880" height="34" rx="10" fill="#161b22"/><rect y="18" width="880" height="16" fill="#161b22"/>
<circle cx="20" cy="17" r="6" fill="#ff5f56"/><circle cx="40" cy="17" r="6" fill="#ffbd2e"/><circle cx="60" cy="17" r="6" fill="#27c93f"/>
<text x="440" y="22" text-anchor="middle" fill="#6e7681" font-size="12" font-family="monospace">fslangmcp — find vs grep on a 2-project F# solution</text>
<g font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="13.5" style="dominant-baseline:hanging">
<text x="26" y="60" opacity="0" xml:space="preserve"><tspan fill="#3fb950" font-weight="700">$ </tspan><tspan fill="#c9d1d9">rg "Order" examples/quickstart/Domain/</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.0187;0.0307;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="81" opacity="0" xml:space="preserve"><tspan fill="#6e7681">Domain/Order.fs:4:   </tspan><tspan fill="#c9d1d9">type Order = {</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.0688;0.0808;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="102" opacity="0" xml:space="preserve"><tspan fill="#6e7681">Domain/Order.fs:10:  </tspan><tspan fill="#c9d1d9">module Order =</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.0875;0.0995;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="123" opacity="0" xml:space="preserve"><tspan fill="#d29922">2 matches — Domain only. The App call-sites are invisible to grep.</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.1250;0.1370;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="165" opacity="0" xml:space="preserve"><tspan fill="#58a6ff" font-weight="700">▸ </tspan><tspan fill="#c9d1d9">find { "query": "Order" }</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.2125;0.2245;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="186" opacity="0" xml:space="preserve"><tspan fill="#3fb950" font-weight="700">matched </tspan><tspan fill="#56d364" font-weight="700">✓</tspan><tspan fill="#3fb950">  via fcs-multiproject-sweep · projectsSwept 2 · totalSites 17</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.2562;0.2682;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="207" opacity="0" xml:space="preserve"><tspan fill="#c9d1d9">  App/Program.fs:3    </tspan><tspan fill="#58a6ff">reference          </tspan><tspan fill="#c9d1d9">Domain.Order      </tspan><tspan fill="#d29922">← grep missed</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.2938;0.3058;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="228" opacity="0" xml:space="preserve"><tspan fill="#c9d1d9">  App/Program.fs:4    </tspan><tspan fill="#58a6ff">field-set-literal  </tspan><tspan fill="#c9d1d9">Domain.Order.Id   </tspan><tspan fill="#d29922">← grep missed</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.3125;0.3245;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="249" opacity="0" xml:space="preserve"><tspan fill="#c9d1d9">  App/Program.fs:10   </tspan><tspan fill="#58a6ff">reference          </tspan><tspan fill="#c9d1d9">Order             </tspan><tspan fill="#d29922">← grep missed</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.3312;0.3432;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="270" opacity="0" xml:space="preserve"><tspan fill="#c9d1d9">  Domain/Order.fs:4   </tspan><tspan fill="#58a6ff">definition         </tspan><tspan fill="#c9d1d9">Domain.Order</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.3500;0.3620;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="291" opacity="0" xml:space="preserve"><tspan fill="#c9d1d9">  Domain/Order.fs:14  </tspan><tspan fill="#58a6ff">field-read         </tspan><tspan fill="#c9d1d9">Domain.Order.Amount</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.3688;0.3808;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="312" opacity="0" xml:space="preserve"><tspan fill="#6e7681">  … 12 more sites across both projects</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.3875;0.3995;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="333" opacity="0" xml:space="preserve"><tspan fill="#58a6ff">breakdown: 2 def · 5 ref · 6 field-set · 4 field-read</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.4313;0.4433;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<text x="26" y="354" opacity="0" xml:space="preserve"><tspan fill="#56d364" font-weight="700">✓ 9 cross-project sites in App that grep-on-Domain never saw.</tspan><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.4813;0.4933;0.965;1" values="0;0;1;1;0" calcMode="linear"/></text>
<g opacity="0"><animate attributeName="opacity" dur="16.0s" repeatCount="indefinite" keyTimes="0;0.5250;0.5350;1" values="0;0;1;1"/><rect x="26" y="375" width="9" height="15" fill="#3fb950"><animate attributeName="opacity" dur="1.1s" repeatCount="indefinite" keyTimes="0;0.5;0.5;1" values="1;1;0;0"/></rect></g>
</g>
</svg>