<rect width="880" height="410" rx="10" fill="#0d1117"/>
<rect width="880" height="34" rx="10" fill="#161b22"/><rect y="18" width="880" height="16" fill="#161b22"/>
<circle cx="20" cy="17" r="6" fill="#ff5f56"/><circle cx="40" cy="17" r="6" fill="#ffbd2e"/><circle cx="60" cy="17" r="6" fill="#27c93f"/>
<text x="440" y="11" text-anchor="middle" fill="#6e7681" font-size="12" style="dominant-baseline:auto">fslangmcp — find vs grep on a 2-project F# solution</text>
<text class="L0" x="26" y="60" xml:space="preserve"><tspan fill="#3fb950" font-weight="700">$ </tspan><tspan fill="#c9d1d9">rg "Order" examples/quickstart/Domain/</tspan></text>
<text class="L1" x="26" y="81" xml:space="preserve"><tspan fill="#6e7681">Domain/Order.fs:4:   </tspan><tspan fill="#c9d1d9">type Order = {</tspan></text>
<text class="L2" x="26" y="102" xml:space="preserve"><tspan fill="#6e7681">Domain/Order.fs:10:  </tspan><tspan fill="#c9d1d9">module Order =</tspan></text>
<text class="L3" x="26" y="123" xml:space="preserve"><tspan fill="#d29922">2 matches — Domain only. The App call-sites are invisible to grep.</tspan></text>
<text class="L4" x="26" y="165" xml:space="preserve"><tspan fill="#58a6ff" font-weight="700">▸ </tspan><tspan fill="#c9d1d9">find { "query": "Order" }</tspan></text>
<text class="L5" x="26" y="186" xml:space="preserve"><tspan fill="#3fb950" font-weight="700">matched </tspan><tspan fill="#56d364" font-weight="700">✓</tspan><tspan fill="#3fb950">  via fcs-multiproject-sweep · projectsSwept 2 · totalSites 17</tspan></text>
<text class="L6" x="26" y="207" xml:space="preserve"><tspan fill="#c9d1d9">  App/Program.fs:3    </tspan><tspan fill="#58a6ff">reference          </tspan><tspan fill="#c9d1d9">Domain.Order      </tspan><tspan fill="#d29922">← grep missed</tspan></text>
<text class="L7" x="26" y="228" xml:space="preserve"><tspan fill="#c9d1d9">  App/Program.fs:4    </tspan><tspan fill="#58a6ff">field-set-literal  </tspan><tspan fill="#c9d1d9">Domain.Order.Id   </tspan><tspan fill="#d29922">← grep missed</tspan></text>
<text class="L8" x="26" y="249" xml:space="preserve"><tspan fill="#c9d1d9">  App/Program.fs:10   </tspan><tspan fill="#58a6ff">reference          </tspan><tspan fill="#c9d1d9">Order             </tspan><tspan fill="#d29922">← grep missed</tspan></text>
<text class="L9" x="26" y="270" xml:space="preserve"><tspan fill="#c9d1d9">  Domain/Order.fs:4   </tspan><tspan fill="#58a6ff">definition         </tspan><tspan fill="#c9d1d9">Domain.Order</tspan></text>
<text class="L10" x="26" y="291" xml:space="preserve"><tspan fill="#c9d1d9">  Domain/Order.fs:14  </tspan><tspan fill="#58a6ff">field-read         </tspan><tspan fill="#c9d1d9">Domain.Order.Amount</tspan></text>
<text class="L11" x="26" y="312" xml:space="preserve"><tspan fill="#6e7681">  … 12 more sites across both projects</tspan></text>
<text class="L12" x="26" y="333" xml:space="preserve"><tspan fill="#58a6ff">breakdown: 2 def · 5 ref · 6 field-set · 4 field-read</tspan></text>
<text class="L13" x="26" y="354" xml:space="preserve"><tspan fill="#56d364" font-weight="700">✓ 9 cross-project sites in App that grep-on-Domain never saw.</tspan></text>
<g style="animation:CUR 16.0s infinite"><rect x="26" y="375" width="9" height="15" fill="#3fb950" style="animation:BLINK 1s steps(1) infinite"/></g>
</svg>