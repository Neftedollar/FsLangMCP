# Publishes the NuGet package on a v* tag push (or manual dispatch).
#
# Auth: NuGet Trusted Publishing via OIDC (NuGet/login@v1) — no long-lived
# API keys. Configured at https://www.nuget.org/account/trusted-publishing
# for repository Neftedollar/FsLangMCP, workflow publish.yml, environment
# `release`. Pattern mirrors Neftedollar/FsMcp's publish flow.
#
# Version source of truth is the git tag: PackageVersion is overridden at
# pack time from the tag name (v0.5.0 → 0.5.0), so patch releases can ship
# by tag alone without touching FsLangMcp.fsproj.

name: Publish NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Guard — refuse non-tag refs
        # workflow_dispatch defaults to running against the default branch, where
        # GITHUB_REF_NAME = "main". The pack step below derives PackageVersion from
        # ${GITHUB_REF_NAME#v}, which would emit "main" — not a valid NuGet version.
        # Force callers to dispatch against an explicit v* tag (UI: "Use workflow from"
        # → "Tags" → vX.Y.Z) or push a tag.
        if: ${{ github.ref_type != 'tag' || !startsWith(github.ref_name, 'v') }}
        run: |
          echo "::error::This workflow must run against a v* tag. Got ref_type=${{ github.ref_type }} ref_name=${{ github.ref_name }}."
          exit 1

      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FsLangMcp.slnx

      - name: Build
        run: dotnet build FsLangMcp.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FsLangMcp.slnx --configuration Release --no-build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack FsLangMcp.fsproj \
            --configuration Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.VERSION }} \
            -o ./nupkgs

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./nupkgs/*.nupkg
          if-no-files-found: error

      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: Neftedollar

      - name: Push to NuGet
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./nupkgs/*.nupkg
