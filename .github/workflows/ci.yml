name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore FsLangMcp.slnx

      - name: Build
        run: dotnet build FsLangMcp.slnx --no-restore --configuration Release --warnaserror

      - name: Test (with coverage)
        # coverlet.msbuild instruments FsLangMcp.dll via the ProjectReference graph (ADR-0001).
        # IncludeTestAssembly is no longer needed — prod and test code are in separate assemblies.
        run: |
          dotnet test FsLangMcp.slnx --no-build --no-restore --configuration Release \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=./coverage/

      - name: Coverage gate (≥ 54% line)
        run: |
          set -e
          # Find the cobertura xml produced by coverlet.msbuild
          COVERAGE_FILE=$(find . -name 'coverage.cobertura.xml' | head -1)
          if [ -z "$COVERAGE_FILE" ]; then
            echo "::error::No coverage file produced"; exit 1
          fi
          # Extract line-rate (decimal 0..1) from the root <coverage> element
          LINE_RATE=$(grep -oP 'line-rate="[0-9.]+"' "$COVERAGE_FILE" | head -1 | grep -oP '[0-9.]+')
          PERCENT=$(awk -v r="$LINE_RATE" 'BEGIN{printf "%.1f", r*100}')
          echo "Line coverage: ${PERCENT}%"
          # Threshold recalibrated to 54% after measuring the post-ADR-0001 baseline at
          # ~54.8% (FsLangMcp.dll only — test-file lines are no longer counted as covered).
          # The original 55% target was set without measuring actual coverage. Raising the
          # threshold back is a separate follow-up once LspBridge.fs and Program.fs get
          # integration test coverage.
          awk -v r="$LINE_RATE" 'BEGIN{exit !(r >= 0.54)}' || {
            echo "::error::Coverage ${PERCENT}% < 54% threshold"; exit 1
          }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cobertura
          path: '**/coverage.cobertura.xml'
          if-no-files-found: warn
